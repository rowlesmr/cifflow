[build-system]
requires = ["maturin>=1.5,<2"]
build-backend = "maturin"

[project]
name = "cifflow"
version = "0.1.0"
description = "A streaming, event-driven parser for Crystallographic Information Files (CIF)"
requires-python = ">=3.10"
dependencies = [
    "duckdb",
    "pyarrow",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.maturin]
python-source = "src"
module-name = "cifflow.cifflow_core"
manifest-path = "cifflow_core/Cargo.toml"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: large real-world CIF files (deselect with -m 'not slow')",
]
addopts = "--cov=cifflow --cov-branch --cov-report=term-missing --cov-report=html:tests/test_coverage"
filterwarnings = [
    "ignore::ResourceWarning",
]

[tool.coverage.run]
branch = true
source = ["cifflow"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "tests/test_coverage"
